version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: todo-db
    restart: always
    environment:
      MYSQL_DATABASE: tododb
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - backend-net

  backend:
    build: ./backend
    container_name: todo-api
    ports:
      - "8080:80"
    environment:
      DB_HOST: database
      DB_USER: root
      DB_PASS: root
      DB_NAME: tododb
    depends_on:
      - database
    networks:
      - backend-net
      - frontend-net

  frontend:
    build: ./frontend
    container_name: todo-app
    ports:
      - "3000:80"
    networks:
      - frontend-net

networks:
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge

volumes:
  db-data:

